<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Details | CropGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #4caf50;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a2e1a 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-light);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .form-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 50px;
            border-radius: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease-out;
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(to right, #ffffff, #81c784);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .instruction {
            text-align: center;
            color: #aaa;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #ddd;
            font-weight: 500;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-light);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2e7d32 0%, #66bb6a 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #388e3c 0%, #81c784 100%);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(46, 125, 50, 0.5), 0 0 20px rgba(76, 175, 80, 0.4);
        }


        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-link {
            background: var(--primary);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600 !important;
            text-decoration: none;
            color: white;
        }

        .btn-location {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            color: var(--primary-light);
            border: 1px solid var(--primary-light);
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .btn-voice {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            color: #ff8a80;
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-voice:hover {
            background: rgba(244, 67, 54, 0.1);
        }


        /* Language Selector */
        .lang-select {
            background: linear-gradient(135deg, #0a0a0a 0%, #1c1c1c 100%);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1em;
            padding-right: 35px;
        }

        .lang-select:hover {
            border-color: var(--primary-light);
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }

        .lang-select option {
            background: #111111;
            color: #ffffff;
            padding: 12px;
        }

    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">🌱 CropGuard</a>
        <div class="nav-links">
            <a href="/" data-i18n="nav_home">Home</a>
            {% if request.user.is_authenticated %}
                <a href="/dashboard" data-i18n="nav_dashboard">Dashboard</a>
            {% endif %}
            <a href="/about" data-i18n="nav_about">About</a>
            <a href="/help" data-i18n="nav_help">Help</a>
            <select class="lang-select" id="lang-select" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="hi">हिन्दी (Hindi)</option>
                <option value="te">తెలుగు (Telugu)</option>
            </select>
            {% if request.user.is_authenticated %}
                <span class="welcome-msg">Hi, {{ request.session.user_name }}</span>
                <a href="/logout" class="auth-link">Logout</a>
            {% endif %}
        </div>


    </nav>


    <div class="container">
        <div class="form-card">
            <h2 data-i18n="form_title">Field Details</h2>
            <p class="instruction" data-i18n="form_subtitle">Enter accurate values for best suggestions</p>
            
            <form action="/predict" method="POST">
                <div class="form-group">
                    <label data-i18n="label_temp">Temperature (°C)</label>
                    <input type="number" step="0.01" name="temperature" placeholder="e.g. 25.5" required>
                </div>
                <div class="form-group">
                    <label data-i18n="label_humid">Humidity (%)</label>
                    <input type="number" step="0.01" name="humidity" placeholder="e.g. 80" required>
                </div>
                <div class="form-group">
                    <label data-i18n="label_rain">Rainfall (mm)</label>
                    <input type="number" step="0.01" name="rainfall" placeholder="e.g. 150" required>
                </div>
                <div class="form-group">
                    <label data-i18n="label_ph">Soil pH</label>
                    <input type="number" step="0.01" name="ph" placeholder="e.g. 6.5" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div class="input-group">
                        <label>🚜 Farmer Skill Level</label>
                        <select name="skill_level">
                            <option value="beginner">Beginner (Simple Crops)</option>
                            <option value="advanced">Advanced (High Profit / Complex)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>🍃 Farming Type</label>
                        <select name="farming_type">
                            <option value="any">Any</option>
                            <option value="organic">Organic Only</option>
                        </select>
                    </div>
                </div>

                <div class="preferences-box" style="margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                    <label style="margin-bottom: 10px; display: block; font-weight: 700; color: var(--primary-light);">🎯 Preferences</label>
                    <div style="display: flex; gap: 20px;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" name="pref_low_water"> Low Water Needs
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" name="pref_fast_growing"> Fast Growing
                        </label>
                    </div>
                </div>

                <div class="input-group">
                    <label>📍 Field/Plot ID (Segmentation)</label>
                    <input type="text" name="plot_id" placeholder="e.g. North Section / Plot A1">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <button type="button" class="btn-location" onclick="detectLocation()" data-i18n="btn_detect">
                        📍 Detect Location
                    </button>
                    <button type="button" class="btn-voice" id="voice-btn" onclick="startVoice()">
                        🎤 Voice Assistant
                    </button>
                </div>

                
                <button type="submit" class="submit-btn" data-i18n="btn_recommend">
                    Recommend Crop 🌾
                </button>
            </form>
        </div>
    </div>

    <script>
        // Voice Assistant Logic
        function startVoice() {
            const btn = document.getElementById('voice-btn');
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            
            recognition.onstart = () => {
                btn.innerText = "Listening...";
                btn.style.background = "rgba(244, 67, 54, 0.2)";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                btn.innerText = "🎤 Voice Assistant";
                btn.style.background = "rgba(255,255,255,0.05)";
                
                // Simple parsing
                if (transcript.includes("detect") || transcript.includes("location")) {
                    detectLocation();
                } else if (transcript.includes("submit") || transcript.includes("recommend")) {
                    document.querySelector('form').submit();
                } else {
                    alert("Heard: " + transcript + ". Try saying 'Detect Location' or 'Recommend Crop'.");
                }
            };

            recognition.onerror = () => {
                btn.innerText = "🎤 Voice Assistant";
                btn.style.background = "rgba(255,255,255,0.05)";
            };

            recognition.start();
        }

        const translations = {
            en: {
                nav_home: "Home", nav_dashboard: "Dashboard", nav_about: "About", nav_help: "Help",
                form_title: "Field Details", form_subtitle: "Enter accurate values for best suggestions",
                label_temp: "Temperature (°C)", label_humid: "Humidity (%)", label_rain: "Rainfall (mm)", label_ph: "Soil pH",
                btn_detect: "📍 Detect Location & Weather", btn_recommend: "Recommend Crop 🌾"
            },
            hi: {
                nav_home: "मुख्य पृष्ठ", nav_dashboard: "डैशबोर्ड", nav_about: "हमारे बारे में", nav_help: "सहायता",
                form_title: "खेत का विवरण", form_subtitle: "सर्वोत्तम सुझावों के लिए सटीक मान दर्ज करें",
                label_temp: "तापमान (°C)", label_humid: "आर्द्रता (%)", label_rain: "वर्षा (mm)", label_ph: "मिट्टी का पीएच",
                btn_detect: "📍 स्थान और मौसम का पता लगाएं", btn_recommend: "फसल की सिफारिश करें 🌾"
            },
            te: {
                nav_home: "హోమ్", nav_dashboard: "డ్యాష్‌బోర్డ్", nav_about: "గురించి", nav_help: "సహాయం",
                form_title: "క్షేత్ర వివరాలు", form_subtitle: "ఉత్తమ సూచనల కోసం ఖచ్చితమైన విలువలను నమోదు చేయండి",
                label_temp: "ఉష్ణోగ్రత (°C)", label_humid: "తేమ (%)", label_rain: "వర్షపాతం (mm)", label_ph: "మట్టి pH",
                btn_detect: "📍 స్థానం మరియు వాతావరణాన్ని గుర్తించండి", btn_recommend: "పంటను సిఫార్సు చేయండి 🌾"
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('lang-select').value;
            localStorage.setItem('preferred_lang', lang);
            applyLanguage(lang);
        }

        function applyLanguage(lang) {
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.innerText = translations[lang][key];
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('preferred_lang') || 'en';
            document.getElementById('lang-select').value = savedLang;
            applyLanguage(savedLang);
        });

        function detectLocation() {
            if (navigator.geolocation) {
                alert("Detecting location...");
                navigator.geolocation.getCurrentPosition((position) => {
                    // Mocking weather/soil data based on "location"
                    document.getElementsByName('temperature')[0].value = (22 + Math.random() * 8).toFixed(1);
                    document.getElementsByName('humidity')[0].value = (60 + Math.random() * 20).toFixed(1);
                    document.getElementsByName('rainfall')[0].value = (80 + Math.random() * 100).toFixed(1);
                    document.getElementsByName('ph')[0].value = (6.0 + Math.random() * 1.5).toFixed(1);
                    alert("Location detected! Auto-filled current weather and soil conditions.");
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }
    </script>
</body>

</html>
